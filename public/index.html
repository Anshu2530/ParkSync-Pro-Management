<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ParkSync Pro — Management System</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <div id="app">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <img src="/images/zone-banner.png" alt="Parking" class="sidebar-bg-img" onerror="this.style.display='none'" />
        <div class="sidebar-header-overlay"></div>
        <div class="sidebar-logo">
          <div class="logo-circle">P</div>
          <div>
            <div class="logo-name">ParkSync Pro</div>
            <div class="logo-sub">MANAGEMENT SYSTEM</div>
          </div>
        </div>
      </div>

      <nav class="sidebar-nav">
        <a class="nav-link" data-path="/" href="#/">
          <span class="nav-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
          </span>
          Dashboard
        </a>
        <a class="nav-link" data-path="/entry" href="#/entry">
          <span class="nav-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 17H3a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v9a2 2 0 0 1-2 2h-2"/><circle cx="7.5" cy="17.5" r="2.5"/><circle cx="17.5" cy="17.5" r="2.5"/></svg>
          </span>
          Vehicle Entry
        </a>
        <a class="nav-link" data-path="/active" href="#/active">
          <span class="nav-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
          </span>
          Active Sessions
        </a>
        <a class="nav-link" data-path="/history" href="#/history">
          <span class="nav-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/><path d="M12 7v5l4 2"/></svg>
          </span>
          Session History
        </a>
        <a class="nav-link" data-path="/spots" href="#/spots">
          <span class="nav-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
          </span>
          Parking Spots
        </a>
        <a class="nav-link" data-path="/zones" href="#/zones">
          <span class="nav-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/></svg>
          </span>
          Zones
        </a>
      </nav>

      <div class="sidebar-footer">
        <div class="status-pill">
          <div class="status-dot"></div>
          <span>System Online</span>
        </div>
        <button id="logout-btn" class="btn btn-outline" style="width:100%; margin-top:16px; justify-content:center; color: var(--rose);">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:14px;height:14px;margin-right:4px;"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
          Logout
        </button>
      </div>
    </aside>

    <main class="main-content">
      <div id="page-content" class="page-container">
        <div class="initial-loader">Loading ParkSync Pro…</div>
      </div>
    </main>
  </div>

  <div id="toast-container"></div>
  <script src="/js/main.js"></script>
</body>
</html>
